# config/config.yaml

# Kafka Settings
kafka:
  broker: "localhost:9092"
  topic: "crime_events"
  producer_rate: 1  # 1 row per second

# PostgreSQL Settings
postgres:
  host: "localhost"
  port: 5432
  database: "crime_analytics"
  user: "crime_user"
  password: "crime_pass"

# MongoDB Settings
mongodb:
  host: "localhost"
  port: 27017
  database: "crime_analytics"
  collection_alerts: "alert_logs"

# Storm Topology Settings
storm:
  window_length_minutes: 5
  slide_interval_minutes: 1
  anomaly_threshold: 100  # Alert if crimes > 100 per district in window

# File Paths (relative to project root)
data_paths:
  crime: "data/Crimes_-_2001_to_Present.csv"
  arrests: "data/Arrests.csv"
  police_stations: "data/Police_Stations.csv"
  violence: "data/Violence_Reduction.csv"
  sex_offenders: "data/Sex_Offenders.csv"